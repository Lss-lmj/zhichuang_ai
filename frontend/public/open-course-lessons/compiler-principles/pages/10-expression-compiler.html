<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>表达式编译器 · 从源码到三地址码</title>
<style>
:root{--bg:#0f1226;--bg-soft:#171a35;--bg-code:#0a0c1c;--fg:#e7ebff;--fg-dim:#a0a8d0;--line:#2a2f55;--accent:#6ee7ff;--accent-2:#ffb86b;--success:#7ee787;--danger:#ff6b8a;--purple:#b78cff;--shadow:0 10px 30px rgba(0,0,0,.35);--radius:14px;--radius-sm:8px}
*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;height:100%;overflow:hidden}code,.mono{font-family:"JetBrains Mono","Fira Code",Menlo,Consolas,monospace}
.demo-shell{height:100vh;display:flex;flex-direction:column}.demo-header{display:flex;align-items:center;gap:16px;padding:12px 22px;background:linear-gradient(90deg,#141735,#1a1e42);border-bottom:1px solid var(--line);box-shadow:var(--shadow)}.demo-header h1{font-size:18px;margin:0;letter-spacing:.5px}.demo-header h1 .sub{color:var(--fg-dim);font-weight:400;margin-left:8px;font-size:13px}.back-btn{color:var(--fg);text-decoration:none;padding:6px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--bg-soft);font-size:13px;transition:.2s}.back-btn:hover{border-color:var(--accent);color:var(--accent)}.header-spacer{flex:1}.badge-head{padding:6px 14px;background:var(--bg-code);border:1px solid var(--line);border-radius:var(--radius-sm);color:var(--accent);font-size:13px}
.demo-main{flex:1;display:flex;min-height:0}.panel-explain{width:30%;min-width:350px;padding:18px 20px;overflow-y:auto;background:var(--bg-soft);border-right:1px solid var(--line)}.panel-stage{flex:1;display:grid;grid-template-rows:auto 1fr auto;min-width:0;background:var(--bg);overflow:hidden}
.phase-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;background:rgba(110,231,255,.12);color:var(--accent);border:1px solid rgba(110,231,255,.35);margin-bottom:10px}.step-title{font-size:20px;margin:0 0 10px;line-height:1.4}.step-body{font-size:14px;line-height:1.75;color:var(--fg)}.step-body p{margin:8px 0}.step-body code{background:var(--bg-code);padding:1px 6px;border-radius:4px;color:var(--accent);font-size:13px}.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;margin-right:6px;font-weight:600;letter-spacing:.5px}.badge--def{background:rgba(183,140,255,.18);color:var(--purple);border:1px solid rgba(183,140,255,.4)}.badge--tip{background:rgba(126,231,135,.15);color:var(--success);border:1px solid rgba(126,231,135,.4)}.rule-box,.artifact-box{margin-top:12px;padding:12px;border:1px solid var(--line);border-radius:var(--radius-sm);background:rgba(10,12,28,.55)}.rule-box h3,.artifact-box h3{margin:0 0 8px;font-size:12px;color:var(--fg-dim);letter-spacing:1px;text-transform:uppercase}.rule-box ul{margin:0;padding-left:18px;color:var(--fg-dim);font-size:12.5px;line-height:1.65}.artifact-box pre{margin:0;white-space:pre-wrap;color:var(--success);font-size:12px;line-height:1.55}
.stage-head{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:14px 18px 10px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(23,26,53,.9),rgba(15,18,38,.84))}.stage-title{font-size:13px;color:var(--fg-dim);letter-spacing:1px;text-transform:uppercase}.stage-title .num{color:var(--accent);font-weight:700}.pipeline{display:flex;gap:8px;flex-wrap:wrap}.pipe{padding:6px 10px;border-radius:999px;border:1px solid var(--line);color:var(--fg-dim);font-size:11px;font-family:"JetBrains Mono",monospace}.pipe.active{color:#0a0c1c;background:var(--accent);border-color:var(--accent)}
.workbench{position:relative;display:grid;grid-template-columns:1.05fr .95fr;grid-template-rows:1fr 1fr;gap:14px;min-height:0;padding:16px;overflow:auto}.workbench::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.25;background-image:linear-gradient(rgba(110,231,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(110,231,255,.06) 1px,transparent 1px);background-size:40px 40px;mask-image:radial-gradient(ellipse at center,black 30%,transparent 76%);-webkit-mask-image:radial-gradient(ellipse at center,black 30%,transparent 76%)}
.pane{position:relative;z-index:1;border:1px solid var(--line);border-radius:var(--radius);background:rgba(23,26,53,.76);box-shadow:0 8px 24px rgba(0,0,0,.22);overflow:hidden;display:grid;grid-template-rows:auto 1fr}.pane h3{display:flex;justify-content:space-between;margin:0;padding:9px 12px;border-bottom:1px solid var(--line);font-size:12px;color:var(--accent);letter-spacing:1px;text-transform:uppercase}.pane h3 span{color:var(--fg-dim);font-weight:400}.source{padding:16px;font-family:"JetBrains Mono",Menlo,monospace;font-size:15px;line-height:1.8;color:var(--fg)}.source mark{padding:2px 4px;border-radius:4px;background:rgba(255,184,107,.25);color:var(--accent-2)}.tokens{display:flex;gap:8px;flex-wrap:wrap;align-content:start;padding:14px}.tok{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:rgba(10,12,28,.6);color:var(--fg-dim);font-family:"JetBrains Mono",monospace;font-size:12px}.tok.active{background:var(--accent);border-color:var(--accent);color:#0a0c1c}.tok.done{border-color:var(--success);color:var(--success)}
.ast{position:relative;padding:12px}.ast svg{width:100%;height:100%;min-height:240px}.node rect{fill:#131634;stroke:var(--line);stroke-width:1.6;transition:.25s}.node text{fill:var(--fg);font-family:"JetBrains Mono",monospace;font-size:12px;text-anchor:middle;dominant-baseline:middle}.node.active rect{stroke:var(--accent);filter:drop-shadow(0 0 8px rgba(110,231,255,.35))}.node.done rect{stroke:var(--success)}.edge{stroke:rgba(160,168,208,.7);stroke-width:1.6;fill:none}.ir-list{padding:14px;display:grid;gap:8px;align-content:start}.ir{padding:8px 10px;border-radius:8px;border:1px solid var(--line);background:rgba(10,12,28,.58);font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--fg-dim)}.ir.active{border-color:var(--accent);color:var(--accent);background:rgba(110,231,255,.1)}.ir.done{border-color:var(--success);color:var(--success)}
.bottom-panel{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:10px 16px;border-top:1px solid var(--line);background:rgba(23,26,53,.72)}.metric{padding:9px 10px;border:1px solid var(--line);border-radius:var(--radius-sm);background:rgba(10,12,28,.55);display:grid;gap:3px}.metric.active{border-color:var(--accent);background:rgba(110,231,255,.1)}.metric strong{font-size:12px;color:var(--accent)}.metric span{font-size:12px;color:var(--fg-dim)}
.demo-controls{display:flex;align-items:center;gap:14px;padding:10px 22px;background:var(--bg-soft);border-top:1px solid var(--line)}.ctrl-btn{background:var(--bg);color:var(--fg);border:1px solid var(--line);padding:8px 16px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;transition:.2s;font-family:inherit}.ctrl-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}.ctrl-btn:disabled{opacity:.4;cursor:not-allowed}.ctrl-btn.primary{background:var(--accent);color:#0b0e22;border-color:var(--accent);font-weight:600}.step-indicator{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}.step-dot{width:9px;height:9px;border-radius:50%;background:var(--line);transition:.3s;cursor:pointer}.step-dot.active{background:var(--accent);transform:scale(1.35);box-shadow:0 0 8px var(--accent)}.step-dot.done{background:var(--fg-dim)}.step-info{font-size:12px;color:var(--fg-dim);font-family:"JetBrains Mono",monospace;min-width:80px;text-align:center}.speed-btn{background:transparent;color:var(--fg-dim);border:1px solid var(--line);padding:6px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:12px}.speed-btn:hover{color:var(--accent)}
@media(max-width:980px){html,body{overflow:auto;height:auto}.demo-shell{height:auto;min-height:100vh}.demo-main{display:grid}.panel-explain{width:auto;min-width:0;border-right:0;border-bottom:1px solid var(--line)}.panel-stage{min-height:820px}.workbench{grid-template-columns:1fr}.bottom-panel{grid-template-columns:1fr 1fr}}@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="demo-shell">
  <header class="demo-header"><a href="../index.html" class="back-btn">← 返回目录</a><h1>表达式编译器 · 从源码到三地址码 <span class="sub">Lexer · Parser · AST · IR</span></h1><span class="header-spacer"></span><span class="badge-head mono">x = a * (b + 3)</span></header>
  <main class="demo-main">
    <aside class="panel-explain" id="panelExplain"></aside>
    <section class="panel-stage">
      <div class="stage-head"><div class="stage-title" id="stageTitle"><span class="num">阶段 A</span> · 源码输入</div><div class="pipeline" id="pipeline"><span class="pipe" data-pipe="source">Source</span><span class="pipe" data-pipe="token">Token</span><span class="pipe" data-pipe="ast">AST</span><span class="pipe" data-pipe="type">Type</span><span class="pipe" data-pipe="ir">IR</span></div></div>
      <div class="workbench">
        <article class="pane"><h3>Source <span>源码</span></h3><div class="source" id="sourceBox"><mark>x</mark> = a * (b + 3);</div></article>
        <article class="pane"><h3>Token Stream <span>词法输出</span></h3><div class="tokens" id="tokenBox"></div></article>
        <article class="pane"><h3>AST <span>语法结构</span></h3><div class="ast"><svg viewBox="0 0 520 260" preserveAspectRatio="xMidYMid meet">
          <path class="edge" d="M260 54 L150 110"/><path class="edge" d="M260 54 L330 110"/><path class="edge" d="M330 150 L250 206"/><path class="edge" d="M330 150 L410 206"/><path class="edge" d="M410 150 L370 206"/><path class="edge" d="M410 150 L460 206"/>
          <g class="node" id="n_assign" transform="translate(260 36)"><rect x="-48" y="-20" width="96" height="40" rx="9"/><text>Assign</text></g><g class="node" id="n_x" transform="translate(148 130)"><rect x="-42" y="-20" width="84" height="40" rx="9"/><text>x</text></g><g class="node" id="n_mul" transform="translate(330 130)"><rect x="-48" y="-20" width="96" height="40" rx="9"/><text>Binary(*)</text></g><g class="node" id="n_a" transform="translate(250 226)"><rect x="-42" y="-20" width="84" height="40" rx="9"/><text>a</text></g><g class="node" id="n_plus" transform="translate(410 130)"><rect x="-48" y="-20" width="96" height="40" rx="9"/><text>Binary(+)</text></g><g class="node" id="n_b" transform="translate(370 226)"><rect x="-42" y="-20" width="84" height="40" rx="9"/><text>b</text></g><g class="node" id="n_3" transform="translate(460 226)"><rect x="-42" y="-20" width="84" height="40" rx="9"/><text>3</text></g>
        </svg></div></article>
        <article class="pane"><h3>Three Address Code <span>IR 输出</span></h3><div class="ir-list" id="irList"></div></article>
      </div>
      <div class="bottom-panel"><div class="metric" data-metric="source"><strong>输入</strong><span>1 条赋值语句</span></div><div class="metric" data-metric="token"><strong>Token</strong><span>9 个 token</span></div><div class="metric" data-metric="ast"><strong>AST</strong><span>7 个语义节点</span></div><div class="metric" data-metric="ir"><strong>IR</strong><span>4 条三地址码</span></div></div>
    </section>
  </main>
  <footer class="demo-controls"><button class="ctrl-btn" id="btnPrev">← 上一步</button><button class="ctrl-btn primary" id="btnPlay">▶ 自动</button><button class="ctrl-btn" id="btnNext">下一步 →</button><div class="step-info" id="stepInfo">1 / 1</div><div class="step-indicator" id="stepDots"></div><button class="ctrl-btn" id="btnReset">⟳ 重置</button><button class="speed-btn" id="btnSpeed">1×</button></footer>
</div>
<script>
const $=id=>document.getElementById(id),panelExplain=$("panelExplain"),stageTitle=$("stageTitle"),stepDots=$("stepDots"),stepInfo=$("stepInfo"),btnPrev=$("btnPrev"),btnNext=$("btnNext"),btnPlay=$("btnPlay"),btnReset=$("btnReset"),btnSpeed=$("btnSpeed");
const tokens=["IDENT(x)","ASSIGN","IDENT(a)","STAR","LPAREN","IDENT(b)","PLUS","INT(3)","RPAREN","SEMI"],irs=["t1 = b + 3","t2 = a * t1","x = t2","return x"],nodes=["n_assign","n_x","n_mul","n_a","n_plus","n_b","n_3"];
const STEPS=[
{phase:"A",pipe:"source",title:"输入表达式语句",html:`<span class="badge badge--def">输入</span><p>综合实验把前面几节串起来：从源码 <code>x = a * (b + 3);</code> 开始，依次经历词法、语法、AST、类型检查和 IR 生成。</p>`,rules:["输入必须满足表达式语言文法。","本节只处理赋值表达式。"],tok:0,ast:[],ir:0,metric:"source",artifact:"source = x = a * (b + 3);"},
{phase:"B",pipe:"token",title:"词法扫描得到 token 流",html:`<span class="badge badge--tip">词法</span><p>扫描器把字符流切分为 token，去掉空白，并记录类型、词素和位置。</p>`,rules:["最长匹配优先。","关键符号保留为运算符 token。"],tok:10,ast:[],ir:0,metric:"token",artifact:tokens.join("\\n")},
{phase:"C",pipe:"ast",title:"解析并构建 AST",html:`<span class="badge badge--tip">语法</span><p>括号影响树形结构，但不会作为 AST 节点保留。乘法节点的右侧是加法子树，表示 <code>b + 3</code> 先参与组合。</p>`,rules:["解析树裁剪为 AST。","运算优先级由树结构表达。"],tok:10,ast:["n_assign","n_x","n_mul","n_a","n_plus","n_b","n_3"],ir:0,metric:"ast",artifact:"Assign(x, Binary(*, a, Binary(+, b, 3)))"},
{phase:"D",pipe:"type",title:"类型检查通过",html:`<span class="badge badge--tip">语义</span><p>假设符号表中 <code>x,a,b:int</code>，字面量 <code>3:int</code>，加法和乘法均满足 <code>int op int -> int</code>。</p>`,rules:["叶子类型来自符号表和字面量。","父节点自底向上推出类型。"],tok:10,ast:nodes,ir:0,metric:"ast",artifact:"type(Binary(+, b, 3)) = int\\ntype(Binary(*, a, t1)) = int\\ntype(Assign(x, ...)) = ok"},
{phase:"E",pipe:"ir",title:"递归生成三地址码",html:`<span class="badge badge--def">IR</span><p>后序遍历 AST：先生成 <code>b + 3</code>，再生成 <code>a * t1</code>，最后赋值给 <code>x</code>。</p>`,rules:["复杂表达式拆成临时变量。","每个 BinaryExpr 返回一个结果临时变量。"],tok:10,ast:nodes,ir:4,metric:"ir",artifact:irs.join("\\n")},
{phase:"E",pipe:"ir",title:"综合实验出口",html:`<span class="badge badge--tip">交付</span><p>学生最终提交一个最小表达式编译器：输入源码，输出 token、AST 和三地址码，并附带测试用例。</p>`,rules:["至少覆盖正常、边界和错误输入。","输出要能复现编译过程。"],tok:10,ast:nodes,ir:4,metric:"ir",artifact:"deliverables:\\n- lexer/parser code\\n- AST JSON output\\n- TAC output\\n- 12 test cases"}
];
let curStep=0,playing=false,playTimer=null,speedIdx=1;const SPEEDS=[.5,1,2],BASE_DELAY=1700;
function renderTokens(n){$("tokenBox").innerHTML=tokens.map((t,i)=>`<span class="tok ${i<n?"done":i===n?"active":""}">${t}</span>`).join("")}
function renderIR(n){$("irList").innerHTML=irs.map((t,i)=>`<div class="ir ${i<n?"done":i===n?"active":""}">${t}</div>`).join("")}
function go(i){if(i<0||i>=STEPS.length)return;curStep=i;const s=STEPS[i];document.querySelectorAll(".pipe").forEach(p=>p.classList.toggle("active",p.dataset.pipe===s.pipe));document.querySelectorAll(".metric").forEach(m=>m.classList.toggle("active",m.dataset.metric===s.metric));renderTokens(s.tok);renderIR(s.ir);const visible=new Set(s.ast||[]);nodes.forEach(id=>{$(id).classList.toggle("done",visible.has(id));$(id).classList.toggle("active",visible.has(id)&&s.pipe==="ast")});renderExplain(s);renderDots();stageTitle.innerHTML=`<span class="num">阶段 ${s.phase}</span> · ${s.title}`}
function renderExplain(s){panelExplain.innerHTML=`<span class="phase-tag">阶段 ${s.phase} · ${s.pipe.toUpperCase()}</span><h2 class="step-title">${s.title}</h2><div class="step-body">${s.html}</div><div class="rule-box"><h3>本步规则</h3><ul>${(s.rules||[]).map(r=>`<li>${r}</li>`).join("")}</ul></div><div class="artifact-box"><h3>当前产物</h3><pre>${s.artifact}</pre></div>`;panelExplain.scrollTop=0}
function renderDots(){stepDots.innerHTML="";STEPS.forEach((_,i)=>{const d=document.createElement("button");d.type="button";d.className="step-dot"+(i===curStep?" active":i<curStep?" done":"");d.onclick=()=>go(i);stepDots.appendChild(d)});stepInfo.textContent=`${curStep+1} / ${STEPS.length}`;btnPrev.disabled=curStep===0;btnNext.disabled=curStep===STEPS.length-1}
function next(){go(curStep+1)}function prev(){go(curStep-1)}function reset(){stopPlay();go(0)}function startPlay(){if(curStep>=STEPS.length-1)go(0);playing=true;btnPlay.textContent="⏸ 暂停";const tick=()=>{if(curStep<STEPS.length-1){go(curStep+1);playTimer=setTimeout(tick,BASE_DELAY/SPEEDS[speedIdx])}else stopPlay()};playTimer=setTimeout(tick,BASE_DELAY/SPEEDS[speedIdx])}function stopPlay(){playing=false;btnPlay.textContent="▶ 自动";if(playTimer){clearTimeout(playTimer);playTimer=null}}function togglePlay(){playing?stopPlay():startPlay()}
btnPrev.onclick=prev;btnNext.onclick=next;btnReset.onclick=reset;btnPlay.onclick=togglePlay;btnSpeed.onclick=()=>{speedIdx=(speedIdx+1)%SPEEDS.length;btnSpeed.textContent=`${SPEEDS[speedIdx]}×`;if(playing){stopPlay();startPlay()}};document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"){e.preventDefault();next()}if(e.key==="ArrowLeft"){e.preventDefault();prev()}if(e.key===" "){e.preventDefault();togglePlay()}if(e.key==="r"||e.key==="R"){e.preventDefault();reset()}});go(0);
</script>
</body>
</html>
