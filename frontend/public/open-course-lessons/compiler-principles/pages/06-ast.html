<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AST 构建 · 解析树到抽象语法树</title>
<style>
:root{
  --bg:#0f1226; --bg-soft:#171a35; --bg-code:#0a0c1c;
  --fg:#e7ebff; --fg-dim:#a0a8d0; --line:#2a2f55;
  --accent:#6ee7ff; --accent-2:#ffb86b;
  --success:#7ee787; --danger:#ff6b8a; --purple:#b78cff;
  --shadow:0 10px 30px rgba(0,0,0,0.35);
  --radius:14px; --radius-sm:8px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
  font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  height:100%;overflow:hidden}
code,.mono{font-family:"JetBrains Mono","Fira Code",Menlo,Consolas,monospace}

.demo-shell{display:flex;flex-direction:column;height:100vh}
.demo-header{
  display:flex;align-items:center;gap:16px;padding:12px 22px;
  background:linear-gradient(90deg,#141735,#1a1e42);
  border-bottom:1px solid var(--line);box-shadow:var(--shadow)
}
.demo-header h1{font-size:18px;margin:0;letter-spacing:.5px}
.demo-header h1 .sub{color:var(--fg-dim);font-weight:400;margin-left:8px;font-size:13px}
.back-btn{
  color:var(--fg);text-decoration:none;padding:6px 12px;border:1px solid var(--line);
  border-radius:var(--radius-sm);background:var(--bg-soft);font-size:13px;
  transition:all .2s
}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.header-spacer{flex:1}
.source-badge{
  padding:6px 14px;background:var(--bg-code);border:1px solid var(--line);
  border-radius:var(--radius-sm);color:var(--accent);font-size:13px;
  white-space:nowrap
}

.demo-main{flex:1;display:flex;min-height:0}
.panel-explain{
  width:32%;min-width:360px;padding:18px 20px;overflow-y:auto;
  background:var(--bg-soft);border-right:1px solid var(--line)
}
.panel-stage{flex:1;position:relative;display:grid;grid-template-rows:auto 1fr auto;min-width:0;background:var(--bg);overflow:hidden}

.phase-tag{
  display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;
  background:rgba(110,231,255,.12);color:var(--accent);
  border:1px solid rgba(110,231,255,.35);margin-bottom:10px
}
.step-title{font-size:20px;margin:0 0 10px;line-height:1.4}
.step-body{font-size:14px;line-height:1.75;color:var(--fg)}
.step-body p{margin:8px 0}
.step-body code{background:var(--bg-code);padding:1px 6px;border-radius:4px;color:var(--accent);font-size:13px}
.badge{
  display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;
  margin-right:6px;font-weight:600;letter-spacing:.5px
}
.badge--def{background:rgba(183,140,255,.18);color:var(--purple);border:1px solid rgba(183,140,255,.4)}
.badge--tip{background:rgba(126,231,135,.15);color:var(--success);border:1px solid rgba(126,231,135,.4)}
.badge--warn{background:rgba(255,107,138,.15);color:var(--danger);border:1px solid rgba(255,107,138,.4)}
.tip-block{
  border-left:3px solid var(--accent);padding:8px 12px;margin:10px 0;
  background:rgba(110,231,255,.06);border-radius:4px;font-size:13px;line-height:1.7
}

.rule-card,.output-card{
  margin-top:12px;padding:12px;border:1px solid var(--line);
  border-radius:var(--radius-sm);background:rgba(10,12,28,.55)
}
.rule-card h3,.output-card h3{
  margin:0 0 8px;font-size:12px;color:var(--fg-dim);
  letter-spacing:1px;text-transform:uppercase
}
.rule-card ul{margin:0;padding-left:18px;color:var(--fg-dim);font-size:12.5px;line-height:1.65}
.output-card pre{
  margin:0;white-space:pre-wrap;color:var(--success);font-size:12px;line-height:1.55
}

.stage-head{
  display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;
  padding:14px 18px 10px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,rgba(23,26,53,.9),rgba(15,18,38,.84))
}
.stage-title{
  font-size:13px;color:var(--fg-dim);letter-spacing:1px;text-transform:uppercase
}
.stage-title .num{color:var(--accent);font-weight:700}
.legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;font-size:11px;color:var(--fg-dim)}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:18px;height:2px;background:var(--line);display:inline-block}
.legend .keep{background:var(--success)}
.legend .cut{background:var(--danger)}
.legend .new{background:var(--accent)}

.token-rail{
  display:flex;gap:7px;align-items:center;justify-content:center;flex-wrap:wrap;
  padding:12px 18px;border-top:1px solid rgba(42,47,85,.75);
  background:rgba(10,12,28,.55)
}
.tok{
  min-width:38px;min-height:34px;display:inline-flex;align-items:center;justify-content:center;
  padding:6px 9px;border-radius:var(--radius-sm);border:1px solid var(--line);
  color:var(--fg-dim);background:rgba(23,26,53,.75);
  font-family:"JetBrains Mono",Menlo,Consolas,monospace;font-size:13px;
  transition:all .25s ease
}
.tok.active{color:#0a0c1c;background:var(--accent-2);border-color:var(--accent-2);transform:translateY(-2px)}
.tok.keep{color:#07111d;background:var(--success);border-color:var(--success)}
.tok.remove{color:var(--danger);border-color:rgba(255,107,138,.5);background:rgba(255,107,138,.08);text-decoration:line-through}

.stage-canvas{position:relative;min-height:0;overflow:hidden}
.stage-canvas::before{
  content:"";position:absolute;inset:0;pointer-events:none;opacity:.3;
  background-image:
    linear-gradient(rgba(110,231,255,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(110,231,255,.06) 1px, transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse at center, black 30%, transparent 76%);
  -webkit-mask-image:radial-gradient(ellipse at center, black 30%, transparent 76%)
}
.stage-svg{position:relative;z-index:1;width:100%;height:100%;display:block}
.divider{stroke:rgba(160,168,208,.25);stroke-dasharray:8 8}
.pane-label{fill:var(--fg-dim);font-size:13px;font-family:"JetBrains Mono",Menlo,Consolas,monospace;letter-spacing:1px}

.edge path{fill:none;stroke:var(--line);stroke-width:1.6;marker-end:url(#arrow);transition:all .28s ease}
.edge.visible path{stroke:rgba(160,168,208,.72)}
.edge.active path{stroke:var(--accent);stroke-width:2.6;marker-end:url(#arrow-active);filter:drop-shadow(0 0 5px rgba(110,231,255,.35))}
.edge.removed path{stroke:var(--danger);stroke-dasharray:5 4;opacity:.65}
.edge:not(.visible){opacity:0}

.node rect,.node circle{
  fill:var(--bg-soft);stroke:var(--line);stroke-width:1.6;transition:all .28s ease
}
.node text{
  fill:var(--fg);font-family:"JetBrains Mono",Menlo,Consolas,monospace;
  font-size:12px;text-anchor:middle;dominant-baseline:middle;pointer-events:none
}
.node.visible{opacity:1;transform:scale(1)}
.node:not(.visible){opacity:0;transform:scale(.78);transform-origin:center}
.node.active rect,.node.active circle{
  fill:var(--accent-2);stroke:var(--accent-2);
  filter:drop-shadow(0 0 10px rgba(255,184,107,.55))
}
.node.active text{fill:#111827}
.node.keep rect,.node.keep circle{stroke:var(--success)}
.node.removed rect,.node.removed circle{
  fill:rgba(255,107,138,.08);stroke:rgba(255,107,138,.75);stroke-dasharray:4 4
}
.node.removed text{fill:var(--danger);text-decoration:line-through}
.ast-node rect,.ast-node circle{fill:#131634;stroke:rgba(110,231,255,.35)}
.ast-node.visible rect,.ast-node.visible circle{stroke:var(--accent)}
.ast-node.keep rect,.ast-node.keep circle{stroke:var(--success)}

.mapping-strip{
  display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;
  padding:10px 18px;background:rgba(23,26,53,.72);border-top:1px solid var(--line)
}
.map-card{
  min-height:66px;padding:9px 10px;border:1px solid var(--line);border-radius:var(--radius-sm);
  background:rgba(10,12,28,.55);display:grid;gap:3px;align-content:center;
  transition:all .25s ease
}
.map-card.active{border-color:var(--accent);background:rgba(110,231,255,.1)}
.map-card strong{font-size:12px;color:var(--accent)}
.map-card span{font-size:12px;color:var(--fg-dim);line-height:1.45}

.demo-controls{
  display:flex;align-items:center;gap:14px;padding:10px 22px;
  background:var(--bg-soft);border-top:1px solid var(--line)
}
.ctrl-btn{
  background:var(--bg);color:var(--fg);border:1px solid var(--line);
  padding:8px 16px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;
  transition:all .2s;font-family:inherit
}
.ctrl-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.ctrl-btn:disabled{opacity:.4;cursor:not-allowed}
.ctrl-btn.primary{background:var(--accent);color:#0b0e22;border-color:var(--accent);font-weight:600}
.step-indicator{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
.step-dot{width:9px;height:9px;border-radius:50%;background:var(--line);transition:all .3s;cursor:pointer}
.step-dot.active{background:var(--accent);transform:scale(1.35);box-shadow:0 0 8px var(--accent)}
.step-dot.done{background:var(--fg-dim)}
.step-info{font-size:12px;color:var(--fg-dim);font-family:"JetBrains Mono",Menlo,monospace;min-width:80px;text-align:center}
.speed-btn{
  background:transparent;color:var(--fg-dim);border:1px solid var(--line);
  padding:6px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:12px
}
.speed-btn:hover{color:var(--accent)}

@media (max-width:900px){
  html,body{overflow:auto;height:auto}
  .demo-shell{height:auto;min-height:100vh}
  .demo-main{display:grid}
  .panel-explain{width:auto;min-width:0;max-height:none;border-right:0;border-bottom:1px solid var(--line)}
  .panel-stage{min-height:720px}
  .mapping-strip{grid-template-columns:1fr 1fr}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="demo-shell">
  <header class="demo-header">
    <a href="../index.html" class="back-btn">← 返回目录</a>
    <h1>AST 构建 · 解析树到抽象语法树 <span class="sub">Parse Tree Pruning · Operator Tree · JSON AST</span></h1>
    <span class="header-spacer"></span>
    <span class="source-badge mono">score = a + b * (c - 2);</span>
  </header>

  <main class="demo-main">
    <aside class="panel-explain" id="panelExplain"></aside>

    <section class="panel-stage">
      <div class="stage-head">
        <div class="stage-title" id="stageTitle"><span class="num">阶段 A</span> · 源码与解析树</div>
        <div class="legend">
          <span><i></i>解析树结构</span>
          <span><i class="cut"></i>语法噪声</span>
          <span><i class="new"></i>AST 节点</span>
          <span><i class="keep"></i>语义保留</span>
        </div>
      </div>

      <div class="stage-canvas">
        <svg class="stage-svg" id="stageSvg" viewBox="0 0 1120 640" preserveAspectRatio="xMidYMid meet">
          <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
              <path d="M0,0 L10,5 L0,10 z" fill="#a0a8d0"/>
            </marker>
            <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
              <path d="M0,0 L10,5 L0,10 z" fill="#6ee7ff"/>
            </marker>
          </defs>

          <path class="divider" d="M620 34 L620 612"/>
          <text class="pane-label" x="34" y="32">PARSE TREE · 语法结构</text>
          <text class="pane-label" x="650" y="32">ABSTRACT SYNTAX TREE · 语义结构</text>

          <g id="parseEdges">
            <g class="edge parse-edge" data-a="p_stmt" data-b="p_id"><path d="M310 82 L92 142"/></g>
            <g class="edge parse-edge" data-a="p_stmt" data-b="p_assign"><path d="M318 86 L192 142"/></g>
            <g class="edge parse-edge" data-a="p_stmt" data-b="p_expr0"><path d="M344 90 L344 140"/></g>

            <g class="edge parse-edge" data-a="p_expr0" data-b="p_expr_l"><path d="M326 182 L214 230"/></g>
            <g class="edge parse-edge" data-a="p_expr0" data-b="p_plus"><path d="M344 184 L344 230"/></g>
            <g class="edge parse-edge" data-a="p_expr0" data-b="p_term_r"><path d="M364 182 L484 230"/></g>
            <g class="edge parse-edge" data-a="p_expr_l" data-b="p_term_a"><path d="M204 274 L154 320"/></g>
            <g class="edge parse-edge" data-a="p_term_a" data-b="p_factor_a"><path d="M154 362 L154 410"/></g>
            <g class="edge parse-edge" data-a="p_factor_a" data-b="p_id_a"><path d="M154 452 L154 512"/></g>
            <g class="edge parse-edge" data-a="p_term_r" data-b="p_term_b"><path d="M470 274 L414 322"/></g>
            <g class="edge parse-edge" data-a="p_term_r" data-b="p_star"><path d="M502 276 L502 322"/></g>

            <g class="edge parse-edge" data-a="p_factor_group" data-b="p_lparen"><path d="M568 366 L536 420"/></g>
            <g class="edge parse-edge" data-a="p_factor_group" data-b="p_expr_inner"><path d="M594 366 L594 420"/></g>
            <g class="edge parse-edge" data-a="p_factor_group" data-b="p_rparen"><path d="M620 366 L654 420"/></g>
            <g class="edge parse-edge" data-a="p_expr_inner" data-b="p_expr_c"><path d="M576 464 L520 510"/></g>

            <g class="edge parse-edge" data-a="p_expr_c" data-b="p_id_c"><path d="M520 554 L520 590"/></g>
            <g class="edge parse-edge" data-a="p_term_2" data-b="p_num_2"><path d="M668 554 L668 590"/></g>

            <g class="edge ast-edge" data-a="a_assign" data-b="a_target"><path d="M840 94 L724 166"/></g>
            <g class="edge ast-edge" data-a="a_assign" data-b="a_plus"><path d="M870 96 L920 166"/></g>
            <g class="edge ast-edge" data-a="a_plus" data-b="a_a"><path d="M904 214 L826 288"/></g>
            <g class="edge ast-edge" data-a="a_plus" data-b="a_mul"><path d="M944 214 L984 288"/></g>
            <g class="edge ast-edge" data-a="a_mul" data-b="a_b"><path d="M968 336 L910 406"/></g>
            <g class="edge ast-edge" data-a="a_mul" data-b="a_minus"><path d="M1008 336 L1032 406"/></g>
            <g class="edge ast-edge" data-a="a_minus" data-b="a_c"><path d="M1016 454 L966 522"/></g>
            <g class="edge ast-edge" data-a="a_minus" data-b="a_2"><path d="M1048 454 L1074 522"/></g>
          </g>

          <g id="parseNodes">
            <g class="node parse-node" id="p_stmt" transform="translate(344 62)"><rect x="-42" y="-20" width="84" height="40" rx="9"/><text>Stmt</text></g>
            <g class="node parse-node" id="p_id" transform="translate(84 164)"><rect x="-42" y="-20" width="84" height="40" rx="9"/><text>id(score)</text></g>
            <g class="node parse-node" id="p_assign" transform="translate(184 164)"><rect x="-24" y="-20" width="48" height="40" rx="9"/><text>=</text></g>
            <g class="node parse-node" id="p_expr0" transform="translate(344 164)"><rect x="-42" y="-20" width="84" height="40" rx="9"/><text>Expr</text></g>
            <g class="node parse-node" id="p_semi" transform="translate(600 164)"><rect x="-24" y="-20" width="48" height="40" rx="9"/><text>;</text></g>
            <g class="node parse-node" id="p_expr_l" transform="translate(204 252)"><rect x="-42" y="-20" width="84" height="40" rx="9"/><text>Expr</text></g>
            <g class="node parse-node" id="p_plus" transform="translate(344 252)"><rect x="-24" y="-20" width="48" height="40" rx="9"/><text>+</text></g>
            <g class="node parse-node" id="p_term_r" transform="translate(504 252)"><rect x="-42" y="-20" width="84" height="40" rx="9"/><text>Term</text></g>
            <g class="node parse-node" id="p_term_a" transform="translate(154 342)"><rect x="-42" y="-20" width="84" height="40" rx="9"/><text>Term</text></g>
            <g class="node parse-node" id="p_factor_a" transform="translate(154 432)"><rect x="-46" y="-20" width="92" height="40" rx="9"/><text>Factor</text></g>
            <g class="node parse-node" id="p_id_a" transform="translate(154 532)"><rect x="-42" y="-20" width="84" height="40" rx="9"/><text>id(a)</text></g>
            <g class="node parse-node" id="p_term_b" transform="translate(414 342)"><rect x="-42" y="-20" width="84" height="40" rx="9"/><text>Term</text></g>
            <g class="node parse-node" id="p_star" transform="translate(502 342)"><rect x="-24" y="-20" width="48" height="40" rx="9"/><text>*</text></g>
            <g class="node parse-node" id="p_factor_group" transform="translate(594 342)"><rect x="-46" y="-20" width="92" height="40" rx="9"/><text>Factor</text></g>
            <g class="node parse-node" id="p_factor_b" transform="translate(414 432)"><rect x="-46" y="-20" width="92" height="40" rx="9"/><text>Factor</text></g>
            <g class="node parse-node" id="p_id_b" transform="translate(414 532)"><rect x="-42" y="-20" width="84" height="40" rx="9"/><text>id(b)</text></g>
            <g class="node parse-node" id="p_lparen" transform="translate(536 442)"><rect x="-24" y="-20" width="48" height="40" rx="9"/><text>(</text></g>
            <g class="node parse-node" id="p_expr_inner" transform="translate(594 442)"><rect x="-42" y="-20" width="84" height="40" rx="9"/><text>Expr</text></g>
            <g class="node parse-node" id="p_rparen" transform="translate(654 442)"><rect x="-24" y="-20" width="48" height="40" rx="9"/><text>)</text></g>
            <g class="node parse-node" id="p_expr_c" transform="translate(520 532)"><rect x="-42" y="-20" width="84" height="40" rx="9"/><text>Expr</text></g>
            <g class="node parse-node" id="p_minus" transform="translate(594 532)"><rect x="-24" y="-20" width="48" height="40" rx="9"/><text>-</text></g>
            <g class="node parse-node" id="p_term_2" transform="translate(668 532)"><rect x="-42" y="-20" width="84" height="40" rx="9"/><text>Term</text></g>
            <g class="node parse-node" id="p_id_c" transform="translate(520 610)"><rect x="-42" y="-18" width="84" height="36" rx="9"/><text>id(c)</text></g>
            <g class="node parse-node" id="p_num_2" transform="translate(668 610)"><rect x="-42" y="-18" width="84" height="36" rx="9"/><text>num(2)</text></g>
          </g>

          <g id="astNodes">
            <g class="node ast-node" id="a_assign" transform="translate(856 70)"><rect x="-52" y="-22" width="104" height="44" rx="10"/><text>Assign</text></g>
            <g class="node ast-node" id="a_target" transform="translate(704 190)"><rect x="-66" y="-22" width="132" height="44" rx="10"/><text>Identifier(score)</text></g>
            <g class="node ast-node" id="a_plus" transform="translate(928 190)"><rect x="-54" y="-22" width="108" height="44" rx="10"/><text>Binary(+)</text></g>
            <g class="node ast-node" id="a_a" transform="translate(808 314)"><rect x="-50" y="-22" width="100" height="44" rx="10"/><text>Identifier(a)</text></g>
            <g class="node ast-node" id="a_mul" transform="translate(992 314)"><rect x="-54" y="-22" width="108" height="44" rx="10"/><text>Binary(*)</text></g>
            <g class="node ast-node" id="a_b" transform="translate(896 432)"><rect x="-50" y="-22" width="100" height="44" rx="10"/><text>Identifier(b)</text></g>
            <g class="node ast-node" id="a_minus" transform="translate(1038 432)"><rect x="-54" y="-22" width="108" height="44" rx="10"/><text>Binary(-)</text></g>
            <g class="node ast-node" id="a_c" transform="translate(956 544)"><rect x="-50" y="-22" width="100" height="44" rx="10"/><text>Identifier(c)</text></g>
            <g class="node ast-node" id="a_2" transform="translate(1080 544)"><rect x="-40" y="-22" width="80" height="44" rx="10"/><text>Literal(2)</text></g>
          </g>
        </svg>
      </div>

      <div class="token-rail" id="tokenRail">
        <span class="tok" data-token="score">score</span>
        <span class="tok" data-token="=">=</span>
        <span class="tok" data-token="a">a</span>
        <span class="tok" data-token="+">+</span>
        <span class="tok" data-token="b">b</span>
        <span class="tok" data-token="*">*</span>
        <span class="tok" data-token="(">(</span>
        <span class="tok" data-token="c">c</span>
        <span class="tok" data-token="-">-</span>
        <span class="tok" data-token="2">2</span>
        <span class="tok" data-token=")">)</span>
        <span class="tok" data-token=";">;</span>
      </div>

      <div class="mapping-strip" id="mappingStrip">
        <div class="map-card" data-map="noise"><strong>裁剪</strong><span>去掉分号、括号和只为文法服务的中间节点。</span></div>
        <div class="map-card" data-map="assign"><strong>赋值</strong><span>把 id = Expr 折叠为 Assign(target, value)。</span></div>
        <div class="map-card" data-map="precedence"><strong>优先级</strong><span>乘法节点保留为加法右子树。</span></div>
        <div class="map-card" data-map="json"><strong>输出</strong><span>AST 可序列化为后续语义分析和 IR 生成的输入。</span></div>
      </div>
    </section>
  </main>

  <footer class="demo-controls">
    <button class="ctrl-btn" id="btnPrev">← 上一步</button>
    <button class="ctrl-btn primary" id="btnPlay">▶ 自动</button>
    <button class="ctrl-btn" id="btnNext">下一步 →</button>
    <div class="step-info" id="stepInfo">1 / 1</div>
    <div class="step-indicator" id="stepDots"></div>
    <button class="ctrl-btn" id="btnReset">⟳ 重置</button>
    <button class="speed-btn" id="btnSpeed">1×</button>
  </footer>
</div>

<script>
const $ = id => document.getElementById(id);
const panelExplain = $("panelExplain");
const stageTitle = $("stageTitle");
const stepDots = $("stepDots");
const stepInfo = $("stepInfo");
const btnPrev = $("btnPrev");
const btnNext = $("btnNext");
const btnPlay = $("btnPlay");
const btnReset = $("btnReset");
const btnSpeed = $("btnSpeed");

const parseNodes = [
  "p_stmt","p_id","p_assign","p_expr0","p_semi","p_expr_l","p_plus","p_term_r",
  "p_term_a","p_factor_a","p_id_a","p_term_b","p_star","p_factor_group",
  "p_factor_b","p_id_b","p_lparen","p_expr_inner","p_rparen","p_expr_c",
  "p_minus","p_term_2","p_id_c","p_num_2"
];
const astNodes = ["a_assign","a_target","a_plus","a_a","a_mul","a_b","a_minus","a_c","a_2"];
const semanticParse = ["p_id","p_assign","p_plus","p_star","p_minus","p_id_a","p_id_b","p_id_c","p_num_2"];
const noiseParse = [
  "p_stmt","p_expr0","p_semi","p_expr_l","p_term_r","p_term_a","p_factor_a",
  "p_term_b","p_factor_group","p_factor_b","p_lparen","p_expr_inner","p_rparen",
  "p_expr_c","p_term_2"
];
const allTokens = ["score","=","a","+","b","*","(","c","-","2",")",";"];

const finalAst = `{
  "type": "Assign",
  "target": { "type": "Identifier", "name": "score" },
  "value": {
    "type": "BinaryExpr", "operator": "+",
    "left": { "type": "Identifier", "name": "a" },
    "right": {
      "type": "BinaryExpr", "operator": "*",
      "left": { "type": "Identifier", "name": "b" },
      "right": {
        "type": "BinaryExpr", "operator": "-",
        "left": { "type": "Identifier", "name": "c" },
        "right": { "type": "Literal", "value": 2 }
      }
    }
  }
}`;

const STEPS = [
  {
    phase:"A", title:"源码进入语法分析之后",
    tag:"阶段 A · 源码与 token",
    html:`<span class="badge badge--def">输入</span>
      <p>本节使用表达式语句 <code>score = a + b * (c - 2);</code>。语法分析器已经根据文法生成解析树，接下来要把它转换为更适合后续阶段使用的 AST。</p>
      <p>解析树保留了完整推导痕迹；AST 只保留语义结构：赋值、标识符、字面量、二元运算和它们之间的父子关系。</p>`,
    rule:["token 流仍保留所有终结符。","AST 不需要记录每一层文法非终结符。"],
    parse:[], ast:[], activeTokens:allTokens, map:"noise",
    output:"等待构建 AST。"
  },
  {
    phase:"A", title:"展开完整解析树",
    tag:"阶段 A · 解析树",
    html:`<span class="badge badge--tip">观察</span>
      <p>解析树忠实记录了推导过程：<code>Expr</code>、<code>Term</code>、<code>Factor</code> 等节点用于表达优先级和结合性。</p>
      <p>这棵树对讲解文法很有用，但直接交给语义分析会显得冗余。AST 构建的第一步就是区分“语义节点”和“文法辅助节点”。</p>`,
    rule:["保留运算符和操作数。","识别只用于推导的辅助节点。"],
    parse:"all", ast:[], keepParse:semanticParse, activeParse:["p_stmt","p_expr0"], activeTokens:allTokens, map:"noise",
    output:"ParseTree(Stmt -> id = Expr ;)"
  },
  {
    phase:"B", title:"剪掉语法噪声",
    tag:"阶段 B · 裁剪",
    html:`<span class="badge badge--warn">裁剪</span>
      <p>分号、括号以及单分支的 <code>Expr → Term → Factor</code> 链条是解析过程的证据，不是最终语义结构。</p>
      <p>括号不会消失为信息丢失，因为它已经通过解析树形状影响了 <code>c - 2</code> 的子树边界。</p>`,
    rule:["去掉 <code>;</code>、<code>(</code>、<code>)</code>。","单分支非终结符链条向下折叠。"],
    parse:"all", ast:[], keepParse:semanticParse, removedParse:noiseParse,
    activeTokens:[";","(",")"], removedTokens:[";","(",")"], map:"noise",
    output:"prune( punctuation, helper-nonterminals )"
  },
  {
    phase:"B", title:"构建赋值根节点",
    tag:"阶段 B · Assign",
    html:`<span class="badge badge--tip">折叠</span>
      <p>模式 <code>id = Expr</code> 被折叠为 <code>Assign(target, value)</code>。左侧标识符成为 <code>target</code>，右侧表达式成为 <code>value</code>。</p>
      <p>AST 根节点现在不再叫 <code>Stmt</code>，而是语义明确的 <code>Assign</code>。</p>`,
    rule:["<code>Stmt -> id = Expr ;</code> 折叠为 <code>Assign</code>。","赋值左侧必须是可写位置。"],
    parse:"all", ast:["a_assign","a_target"], keepParse:["p_id","p_assign"], activeParse:["p_stmt","p_id","p_assign"],
    activeAst:["a_assign","a_target"], keepAst:["a_assign","a_target"], activeTokens:["score","="], keepTokens:["score","="], map:"assign",
    output:`Assign(
  target = Identifier("score"),
  value = ?
)`
  },
  {
    phase:"B", title:"折叠左操作数 a",
    tag:"阶段 B · Identifier",
    html:`<span class="badge badge--tip">折叠</span>
      <p>左侧表达式 <code>a</code> 在解析树中经过 <code>Expr → Term → Factor → id</code> 多层包装。</p>
      <p>AST 中只需要一个 <code>Identifier(a)</code> 节点。辅助层被移除，操作数本身保留下来。</p>`,
    rule:["单操作数表达式直接折叠为叶子节点。","叶子节点记录名称、类型位置和源码跨度。"],
    parse:"all", ast:["a_assign","a_target","a_plus","a_a"],
    keepParse:["p_id_a"], removedParse:["p_expr_l","p_term_a","p_factor_a"], activeParse:["p_expr_l","p_term_a","p_factor_a","p_id_a"],
    activeAst:["a_a"], keepAst:["a_assign","a_target","a_a"], activeTokens:["a"], keepTokens:["score","=","a"], map:"assign",
    output:`Identifier("a")`
  },
  {
    phase:"C", title:"保留加法结构",
    tag:"阶段 C · 运算符树",
    html:`<span class="badge badge--def">优先级</span>
      <p><code>a + ...</code> 产生一个 <code>Binary(+)</code> 节点。加号不是叶子装饰，而是表达式的父节点。</p>
      <p>解析树中 <code>Expr -> Expr + Term</code> 的形状告诉我们：加法左边是 <code>a</code>，右边还要继续分析一个 <code>Term</code>。</p>`,
    rule:["二元运算符变为 <code>BinaryExpr</code>。","左、右孩子来自解析树对应子树。"],
    parse:"all", ast:["a_assign","a_target","a_plus","a_a"],
    keepParse:["p_plus","p_id_a"], activeParse:["p_expr0","p_expr_l","p_plus","p_term_r"],
    activeAst:["a_plus"], keepAst:["a_assign","a_target","a_plus","a_a"], activeTokens:["+"], keepTokens:["score","=","a","+"], map:"precedence",
    output:`Binary("+",
  left = Identifier("a"),
  right = ?
)`
  },
  {
    phase:"C", title:"乘法优先级进入右子树",
    tag:"阶段 C · Precedence",
    html:`<span class="badge badge--tip">关键</span>
      <p><code>b * (c - 2)</code> 位于加法的右侧 <code>Term</code> 中，因此乘法必须成为 <code>+</code> 的右孩子，而不能与加法平级。</p>
      <p>这就是 AST 保留运算优先级的方式：不是靠括号字符，而是靠树的层级。</p>`,
    rule:["<code>*</code> 节点位于 <code>+</code> 节点之下。","右结合关系由解析树路径决定。"],
    parse:"all", ast:["a_assign","a_target","a_plus","a_a","a_mul","a_b"],
    keepParse:["p_star","p_id_b"], activeParse:["p_term_r","p_term_b","p_star","p_factor_b","p_id_b"],
    activeAst:["a_mul","a_b"], keepAst:["a_assign","a_target","a_plus","a_a","a_mul","a_b"], activeTokens:["b","*"], keepTokens:["score","=","a","+","b","*"], map:"precedence",
    output:`Binary("*",
  left = Identifier("b"),
  right = ?
)`
  },
  {
    phase:"C", title:"括号只留下子表达式边界",
    tag:"阶段 C · Parenthesized Expr",
    html:`<span class="badge badge--warn">注意</span>
      <p>括号本身不会成为 AST 节点。它的作用是在解析阶段改变子树边界，让 <code>c - 2</code> 先组合成一个整体。</p>
      <p>因此 AST 只新增 <code>Binary(-)</code>，并把 <code>Identifier(c)</code> 与 <code>Literal(2)</code> 挂到它下面。</p>`,
    rule:["括号被裁剪，括号内表达式保留。","数字字面量转换为 <code>Literal</code>。"],
    parse:"all", ast:["a_assign","a_target","a_plus","a_a","a_mul","a_b","a_minus","a_c","a_2"],
    removedParse:["p_lparen","p_rparen"], keepParse:["p_minus","p_id_c","p_num_2"],
    activeParse:["p_factor_group","p_lparen","p_expr_inner","p_rparen","p_expr_c","p_minus","p_term_2","p_id_c","p_num_2"],
    activeAst:["a_minus","a_c","a_2"], keepAst:["a_assign","a_target","a_plus","a_a","a_mul","a_b","a_minus","a_c","a_2"],
    activeTokens:["(","c","-","2",")"], removedTokens:["(",")"], keepTokens:["score","=","a","+","b","*","c","-","2"], map:"precedence",
    output:`Binary("-",
  left = Identifier("c"),
  right = Literal(2)
)`
  },
  {
    phase:"D", title:"得到完整 AST",
    tag:"阶段 D · AST 输出",
    html:`<span class="badge badge--tip">结果</span>
      <p>完整 AST 已经只保留后续阶段真正需要的信息：节点类型、运算符、标识符名称、字面量值和子节点关系。</p>
      <p>它可以直接交给语义分析做符号查询与类型检查，也可以继续交给 IR 生成阶段产生三地址码。</p>`,
    rule:["AST 是语义结构，不是语法推导记录。","节点应携带源码位置，便于报错定位。"],
    parse:"all", ast:"all", removedParse:noiseParse, keepParse:semanticParse,
    keepAst:astNodes, keepTokens:["score","=","a","+","b","*","c","-","2"], removedTokens:["(",")",";"], map:"json",
    output:finalAst
  },
  {
    phase:"D", title:"用先序遍历检查结构",
    tag:"阶段 D · Verification",
    html:`<span class="badge badge--def">自检</span>
      <p>用先序遍历读这棵 AST：先看到赋值，再看到目标变量，最后看到右侧表达式的加法、乘法和减法层级。</p>
      <p>如果遍历结果是 <code>Assign score (+ a (* b (- c 2)))</code>，说明优先级和括号边界都被正确保留下来了。</p>`,
    rule:["先序遍历可快速检查树形结构。","后续 IR 生成会按这棵树递归生成临时变量。"],
    parse:"all", ast:"all", removedParse:noiseParse, keepParse:semanticParse,
    activeAst:["a_assign","a_target","a_plus","a_a","a_mul","a_b","a_minus","a_c","a_2"],
    keepTokens:["score","=","a","+","b","*","c","-","2"], removedTokens:["(",")",";"], map:"json",
    output:`preorder:
Assign score (+ a (* b (- c 2)))

next:
t1 = c - 2
t2 = b * t1
t3 = a + t2
score = t3`
  }
];

let curStep = 0;
let playing = false;
let playTimer = null;
let speedIdx = 1;
const SPEEDS = [0.5,1,2];
const BASE_DELAY = 1800;

function asList(value, all){
  if(value === "all") return all;
  return Array.isArray(value) ? value : [];
}

function setNodeState(kind, visibleIds, activeIds, keepIds, removedIds){
  const visible = new Set(visibleIds);
  const active = new Set(activeIds || []);
  const keep = new Set(keepIds || []);
  const removed = new Set(removedIds || []);
  document.querySelectorAll(`.${kind}-node`).forEach(node=>{
    node.classList.toggle("visible", visible.has(node.id));
    node.classList.toggle("active", active.has(node.id));
    node.classList.toggle("keep", keep.has(node.id));
    node.classList.toggle("removed", removed.has(node.id));
  });
}

function setEdgeState(kind, visibleIds, activeIds, removedIds){
  const visible = new Set(visibleIds);
  const active = new Set(activeIds || []);
  const removed = new Set(removedIds || []);
  document.querySelectorAll(`.${kind}-edge`).forEach(edge=>{
    const a = edge.dataset.a;
    const b = edge.dataset.b;
    const id = `${a}:${b}`;
    const isVisible = visible.has(a) && visible.has(b);
    edge.classList.toggle("visible", isVisible);
    edge.classList.toggle("active", isVisible && (active.has(a) || active.has(b) || active.has(id)));
    edge.classList.toggle("removed", isVisible && (removed.has(a) || removed.has(b)));
  });
}

function setTokens(step){
  const active = new Set(step.activeTokens || []);
  const keep = new Set(step.keepTokens || []);
  const removed = new Set(step.removedTokens || []);
  document.querySelectorAll(".tok").forEach(tok=>{
    const id = tok.dataset.token;
    tok.classList.toggle("active", active.has(id));
    tok.classList.toggle("keep", keep.has(id));
    tok.classList.toggle("remove", removed.has(id));
  });
}

function setMapping(step){
  document.querySelectorAll(".map-card").forEach(card=>{
    card.classList.toggle("active", card.dataset.map === step.map);
  });
}

function renderExplain(step){
  const rules = (step.rule || []).map(item=>`<li>${item}</li>`).join("");
  panelExplain.innerHTML = `
    <span class="phase-tag">${step.tag}</span>
    <h2 class="step-title">${step.title}</h2>
    <div class="step-body">${step.html}</div>
    <div class="rule-card">
      <h3>本步规则</h3>
      <ul>${rules}</ul>
    </div>
    <div class="output-card">
      <h3>当前输出</h3>
      <pre>${step.output || ""}</pre>
    </div>
  `;
  panelExplain.scrollTop = 0;
}

function renderDots(){
  stepDots.innerHTML = "";
  STEPS.forEach((_, index)=>{
    const dot = document.createElement("button");
    dot.type = "button";
    dot.className = "step-dot" + (index === curStep ? " active" : index < curStep ? " done" : "");
    dot.title = `Step ${index + 1}`;
    dot.addEventListener("click",()=>go(index));
    stepDots.appendChild(dot);
  });
  stepInfo.textContent = `${curStep + 1} / ${STEPS.length}`;
  btnPrev.disabled = curStep === 0;
  btnNext.disabled = curStep === STEPS.length - 1;
}

function updateStageTitle(step){
  const map = {
    A:"源码与解析树",
    B:"裁剪与折叠",
    C:"运算符树",
    D:"AST 输出"
  };
  stageTitle.innerHTML = `<span class="num">阶段 ${step.phase}</span> · ${map[step.phase]}`;
}

function go(index){
  if(index < 0 || index >= STEPS.length) return;
  curStep = index;
  const step = STEPS[index];
  const parseVisible = asList(step.parse, parseNodes);
  const astVisible = asList(step.ast, astNodes);
  setNodeState("parse", parseVisible, step.activeParse, step.keepParse, step.removedParse);
  setNodeState("ast", astVisible, step.activeAst, step.keepAst, step.removedAst);
  setEdgeState("parse", parseVisible, step.activeParse, step.removedParse);
  setEdgeState("ast", astVisible, step.activeAst, step.removedAst);
  setTokens(step);
  setMapping(step);
  renderExplain(step);
  renderDots();
  updateStageTitle(step);
}

function next(){ go(curStep + 1); }
function prev(){ go(curStep - 1); }
function reset(){ stopPlay(); go(0); }

function startPlay(){
  if(curStep >= STEPS.length - 1) go(0);
  playing = true;
  btnPlay.textContent = "⏸ 暂停";
  const tick = ()=>{
    if(curStep < STEPS.length - 1){
      go(curStep + 1);
      playTimer = window.setTimeout(tick, BASE_DELAY / SPEEDS[speedIdx]);
    }else{
      stopPlay();
    }
  };
  playTimer = window.setTimeout(tick, BASE_DELAY / SPEEDS[speedIdx]);
}

function stopPlay(){
  playing = false;
  btnPlay.textContent = "▶ 自动";
  if(playTimer){
    window.clearTimeout(playTimer);
    playTimer = null;
  }
}

function togglePlay(){ playing ? stopPlay() : startPlay(); }

btnPrev.addEventListener("click",prev);
btnNext.addEventListener("click",next);
btnReset.addEventListener("click",reset);
btnPlay.addEventListener("click",togglePlay);
btnSpeed.addEventListener("click",()=>{
  speedIdx = (speedIdx + 1) % SPEEDS.length;
  btnSpeed.textContent = `${SPEEDS[speedIdx]}×`;
  if(playing){ stopPlay(); startPlay(); }
});

document.addEventListener("keydown",event=>{
  if(event.key === "ArrowRight"){ event.preventDefault(); next(); }
  if(event.key === "ArrowLeft"){ event.preventDefault(); prev(); }
  if(event.key === " "){ event.preventDefault(); togglePlay(); }
  if(event.key === "r" || event.key === "R"){ event.preventDefault(); reset(); }
});

go(0);
</script>
</body>
</html>
